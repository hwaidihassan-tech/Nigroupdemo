
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NI-GROUP</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#222;
}

header{
background:#0f172a;
color:white;
padding:80px 20px;
text-align:center;
}

header h1{
font-size:48px;
margin-bottom:15px;
}

header p{
font-size:20px;
opacity:.9;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 28px;
background:#ea580c;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.section{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

.title{
text-align:center;
font-size:36px;
margin-bottom:40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:15px;
}

.card p{
padding:0 15px 20px;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:30px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>NI-GROUP</h1>
<p>Construction Materials & Tile Adhesives</p>
<a class="btn" href="#">Contact Us</a>
</header>

<section class="section">
<h2 class="title">Our Products</h2>

<div class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1517048676732-d65bc937f952">
<h3>Tile Adhesive</h3>
<p>High quality adhesive for walls and floors.</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1504307651254-35680f356dfd">
<h3>NI GROUT</h3>
<p>Waterproof grout for professional finishing.</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1489515217757-5fd1be406fef">
<h3>NI WALL</h3>
<p>Premium finishing plaster for interiors.</p>
</div>

</div>
</section>

<footer>
© 2025 NI-GROUP - All Rights Reserved
</footer>

</body>
</html>
